<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#24483f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="伝検3級">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <title>伝統検定3級 2週間合格ドリル</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211d;
      --muted: #66736d;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --line: #dfe5de;
      --accent: #2f6f62;
      --accent-2: #b74338;
      --gold: #b9872b;
      --soft: #edf4f0;
      --wrong: #fff0ee;
      --right: #edf8f1;
      --shadow: 0 10px 30px rgba(25, 42, 35, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.55;
      letter-spacing: 0;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(251, 250, 246, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }
    .top {
      max-width: 920px;
      margin: 0 auto;
      padding: 14px 16px 10px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.2;
    }
    .status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      min-width: 0;
    }
    .metric b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }
    .metric span {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    nav {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 0 16px 12px;
    }
    button, select {
      font: inherit;
    }
    .tab, .chip, .primary, .ghost, .choice, .mini {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      min-height: 42px;
    }
    .tab {
      padding: 9px 4px;
      font-size: 13px;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 16px 16px 80px;
    }
    section[hidden] { display: none; }
    .band {
      margin: 0 0 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin: 8px 0 14px;
    }
    .select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      min-height: 44px;
      padding: 0 10px;
    }
    .question-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .q-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }
    .q-text {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 14px;
    }
    .choices {
      display: grid;
      gap: 10px;
    }
    .choice {
      width: 100%;
      text-align: left;
      padding: 12px;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: center;
      min-height: 52px;
    }
    .choice .letter {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--soft);
      font-weight: 700;
      color: var(--accent);
    }
    .choice.selected {
      border-color: var(--accent);
      background: var(--soft);
    }
    .choice.correct {
      border-color: #65a878;
      background: var(--right);
    }
    .choice.wrong {
      border-color: #d98d83;
      background: var(--wrong);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
      padding: 11px 10px;
    }
    .ghost {
      padding: 11px 10px;
      background: var(--panel);
    }
    .feedback {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--ink);
    }
    .result-grid, .sheet-grid, .plan-grid {
      display: grid;
      gap: 10px;
    }
    .result-card, .sheet-card, .plan-card, .flashcard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .result-card strong, .sheet-card strong {
      display: block;
      margin-bottom: 4px;
    }
    .bar {
      height: 9px;
      background: #e8ece8;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 8px;
    }
    .bar span {
      display: block;
      height: 100%;
      background: var(--accent);
      width: 0%;
    }
    .flashcard {
      min-height: 230px;
      display: grid;
      align-content: center;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .flash-front {
      font-size: 22px;
      font-weight: 800;
    }
    .flash-back {
      margin-top: 16px;
      color: var(--accent);
      font-weight: 700;
      font-size: 18px;
    }
    .card-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .mini {
      padding: 9px 6px;
      min-height: 38px;
      font-size: 13px;
    }
    .mini.good { border-color: #65a878; background: var(--right); }
    .mini.bad { border-color: #d98d83; background: var(--wrong); }
    .rubric {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      font-size: 14px;
    }
    .rubric th, .rubric td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    .rubric th {
      background: var(--soft);
    }
    .note {
      color: var(--muted);
      font-size: 13px;
    }
    .hidden { display: none; }
    @media (min-width: 720px) {
      h1 { font-size: 24px; }
      .status { max-width: 520px; }
      .controls { grid-template-columns: repeat(3, 1fr); }
      .result-grid, .sheet-grid, .plan-grid { grid-template-columns: repeat(2, 1fr); }
      .choices { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <h1>伝統検定3級 2週間合格ドリル</h1>
      <div class="status" aria-label="学習状況">
        <div class="metric"><b id="metric-best">-</b><span>模試ベスト</span></div>
        <div class="metric"><b id="metric-cards">0</b><span>覚えたカード</span></div>
        <div class="metric"><b id="metric-streak">0</b><span>連続正解</span></div>
      </div>
    </div>
    <nav aria-label="メニュー">
      <button class="tab active" data-tab="exam">模試</button>
      <button class="tab" data-tab="cards">カード</button>
      <button class="tab" data-tab="sheet">要点</button>
      <button class="tab" data-tab="plan">2週間</button>
    </nav>
  </header>

  <main>
    <section id="exam">
      <div class="band">
        <div class="controls">
          <select id="exam-select" class="select" aria-label="模擬試験選択"></select>
          <select id="category-select" class="select" aria-label="分野選択"></select>
          <select id="mode-select" class="select" aria-label="出題モード">
            <option value="all">全部解く</option>
            <option value="random10">ランダム10問</option>
            <option value="weak">弱点だけ</option>
            <option value="random">ランダム20問</option>
          </select>
        </div>
        <button id="start-exam" class="primary">開始</button>
      </div>
      <div id="quiz-area" class="question-box hidden"></div>
      <div id="result-area" class="hidden"></div>
    </section>

    <section id="cards" hidden>
      <div class="band">
        <select id="card-filter" class="select" aria-label="カード分野"></select>
      </div>
      <div id="flashcard" class="flashcard"></div>
      <div class="card-row">
        <button id="card-prev" class="mini">前へ</button>
        <button id="card-flip" class="mini">答え</button>
        <button id="card-next" class="mini">次へ</button>
      </div>
      <div class="card-row">
        <button id="card-hard" class="mini bad">苦手</button>
        <button id="card-known" class="mini good">覚えた</button>
        <button id="card-shuffle" class="mini">混ぜる</button>
      </div>
    </section>

    <section id="sheet" hidden>
      <div class="sheet-grid" id="sheet-grid"></div>
      <h2>語呂・ニーモニクス</h2>
      <div class="sheet-grid" id="mnemonics-grid"></div>
    </section>

    <section id="plan" hidden>
      <div class="plan-grid" id="plan-grid"></div>
      <h2>採点表</h2>
      <table class="rubric">
        <thead><tr><th>得点</th><th>判定</th><th>学習アクション</th></tr></thead>
        <tbody id="rubric-body"></tbody>
      </table>
      <p class="note">分野別は10問中 0-5=弱点、6-7=要補強、8-10=強み。公式基準ではなく、70%以上を安定突破するための管理用です。</p>
    </section>
  </main>

        el("div", { class:"q-meta" }, [el("span", {}, [`${quiz.index + 1}/${quiz.questions.length}`]), el("span", {}, [q.category])]),
        el("p", { class:"q-text" }, [q.text]),
        el("div", { class:"choices" }, Object.entries(q.choices).map(([letter, text]) => {
          const btn = el("button", { class:"choice", type:"button" }, [el("span", { class:"letter" }, [letter]), el("span", {}, [text])]);
          if (selected === letter) btn.classList.add("selected");
          if (quiz.locked) {
            if (letter === q.answer) btn.classList.add("correct");
            if (selected === letter && letter !== q.answer) btn.classList.add("wrong");
          }
          btn.addEventListener("click", () => answerQuestion(letter));
          return btn;
        })),
        el("div", { class:"actions" }, [
          el("button", { class:"ghost", id:"prev-q", type:"button" }, ["前へ"]),
          el("button", { class:"primary", id:"next-q", type:"button" }, [quiz.index === quiz.questions.length - 1 ? "結果を見る" : "次へ"])
        ])
      );
      document.getElementById("prev-q").disabled = quiz.index === 0;
      document.getElementById("prev-q").addEventListener("click", () => { quiz.index--; quiz.locked = false; renderQuestion(); });
      document.getElementById("next-q").addEventListener("click", nextQuestion);
      if (quiz.locked) {
        box.append(el("div", { class:"feedback" }, [`正解: ${q.answer} ${q.choices[q.answer]}`]));
      }
    }
    function answerQuestion(letter) {
      const q = quiz.questions[quiz.index];
      quiz.answers[`${q.exam}-${q.no}`] = letter;
      quiz.locked = true;
      if (letter === q.answer) state.streak += 1;
      else state.streak = 0;
      save();
      renderQuestion();
    }
    function nextQuestion() {
      if (quiz.index < quiz.questions.length - 1) {
        quiz.index++;
        quiz.locked = false;
        renderQuestion();
      } else showResult();
    }
    function showResult() {
      const byCat = Object.fromEntries(CATEGORIES.map(c => [c, { ok:0, total:0 }]));
      let ok = 0;
      const wrong = [];
      quiz.questions.forEach(q => {
        const got = quiz.answers[`${q.exam}-${q.no}`];
        const hit = got === q.answer;
        byCat[q.category].total += 1;
        if (hit) { ok++; byCat[q.category].ok += 1; }
        else wrong.push(`${q.exam}-${q.no}`);
      });
      if (quiz.questions.length === 80) state.best = Math.max(state.best, ok);
      state.wrongQuestions = [...new Set([...wrong, ...state.wrongQuestions])].slice(0, 120);
      save();
      const result = document.getElementById("result-area");
      const scaled = Math.round(ok / quiz.questions.length * 80);
      const judge = rubric.find(r => scaled >= Number(r[0].split("-")[0]) && scaled <= Number(r[0].split("-")[1])) || rubric.at(-1);
      result.innerHTML = `<h2>結果 ${ok}/${quiz.questions.length}問 正解</h2><p><strong>${judge[1]}</strong> ${judge[2]}</p><div class="result-grid"></div>`;
      const grid = result.querySelector(".result-grid");
      CATEGORIES.forEach(cat => {
        const r = byCat[cat];
        if (!r.total) return;
        const level = r.ok <= Math.floor(r.total * .5) ? "弱点" : r.ok <= Math.floor(r.total * .7) ? "要補強" : "強み";
        const card = el("article", { class:"result-card" }, [
          el("strong", {}, [cat]),
          el("div", {}, [`${r.ok}/${r.total} ${level}`]),
          el("div", { class:"bar" }, [el("span", { style:`width:${r.ok / r.total * 100}%` }, [])])
        ]);
        grid.append(card);
      });
      document.getElementById("quiz-area").classList.add("hidden");
      result.classList.remove("hidden");
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    }
    function filterCards() {
      const f = document.getElementById("card-filter").value;
      cardList = flashcards.filter(c => f === "all" || c[0] === f);
      cardIndex = 0;
      cardShown = false;
      renderCard();
    }
    function renderCard() {
      const wrap = document.getElementById("flashcard");
      if (!cardList.length) {
        wrap.innerHTML = "<div>カードがありません</div>";
        return;
      }
      const card = cardList[cardIndex];
      const id = `${card[1]}-${card[2]}`;
      wrap.innerHTML = `<div class="note">${card[0]} ${cardIndex + 1}/${cardList.length}</div><div class="flash-front">${card[1]}</div>${cardShown ? `<div class="flash-back">${card[2]}</div>` : `<div class="note">答えボタンで確認</div>`}${state.knownCards.includes(id) ? `<div class="note">覚えた済み</div>` : ""}`;
    }
    function moveCard(delta) {
      cardIndex = (cardIndex + delta + cardList.length) % cardList.length;
      cardShown = false;
      renderCard();
    }
    function markKnown() {
      const c = cardList[cardIndex], id = `${c[1]}-${c[2]}`;
      if (!state.knownCards.includes(id)) state.knownCards.push(id);
      save();
      moveCard(1);
    }
    function markHard() {
      cardShown = true;
      renderCard();
    }
    init();
    if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
